services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: 1000:1000 # Use 'id' command to find your UID:GID
    network_mode: host # Recommended for DLNA and easier networking
    volumes:
      - /path/to/config:/config
      - /path/to/cache:/cache
      - /path/to/media:/media:ro # ':ro' for read-only safety
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=http://your-ip-address

  # MariaDB (Optional: For other apps in your stack, not for Jellyfin core)
  mariadb:
    image: mariadb:latest
    container_name: mariadb
    environment:
      - MYSQL_ROOT_PASSWORD=your_secure_password
      - MYSQL_DATABASE=example_db
      - MYSQL_USER=example_user
      - MYSQL_PASSWORD=example_password
    volumes:
      - /path/to/mysql_data:/var/lib/mysql
    restart: unless-stopped
