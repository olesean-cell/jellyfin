services:
  jellyfin:
    image: jellyfin/jellyfin
    container_name: jellyfin
    user: 1000:1000 # Use your local User ID and Group ID
    network_mode: 'host'
    volumes:
      - /mnt/data/config:/config
      - /mnt/data/cache:/cache
      - /mnt/data/VIdeo:/Movies:ro
      - /mnt/storage/tvshows:/Shows:ro
    restart: 'unless-stopped'
