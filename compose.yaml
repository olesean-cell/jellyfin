services:
  jellyfin:
    image: jellyfin/jellyfin:latest
    container_name: jellyfin
    user: 1000:1000 # Use 'id' command to find your UID:GID
    network_mode: host # Recommended for DLNA and easier networking
    volumes:
      - /mnt/data/config:/config
      - /mnt/data/cache:/cache
      - /mnt/data/VIdeo:/Movies:ro
      - /mnt/storage/tvshows:/Shows:ro # ':ro' for read-only safety
    restart: unless-stopped
    environment:
      - JELLYFIN_PublishedServerUrl=https://jellyfin.bradleyrogers.online

